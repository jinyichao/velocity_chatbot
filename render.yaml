services:
  - type: web
    name: velocity-chatbot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python3 scripts/ingest_knowledge.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DASHSCOPE_API_KEY
        sync: false          # set manually in Render dashboard
      - key: QWEN_MODEL
        value: qwen-plus
      - key: DASHSCOPE_BASE_URL
        value: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      - key: CHROMA_PERSIST_DIR
        value: ./data/chroma
      - key: AUDIT_DB_PATH
        value: ./data/audit.db
      - key: ALLOWED_ORIGINS
        fromService:
          name: velocity-chatbot-frontend
          type: web
          property: host
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: velocity-chatbot-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: velocity-chatbot-backend
          type: web
          property: host
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
